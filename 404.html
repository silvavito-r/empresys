<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EmpreSys</title>
    <script>
      // GitHub Pages SPA redirect
      // Salva a URL no sessionStorage e redireciona para o index.html
      var l = window.location
      sessionStorage.redirect = l.href
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/empresys/'
      )
    </script>
  </head>
  <body></body>
</html>
